<!DOCTYPE html>
<html>
    <head>

<style>
        .card{
            height:35px;
            width: 1000px;
            color: white;
            background-color: burlywood;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .circle{
            width: 20px;
            height: 20px;
            border: 0.3em solid black;
            border-radius: 50%;
        }
        .triangle{
            margin-right: 1px;
            border-left: 15px solid transparent;
            border-right:15px solid transparent;
            border-bottom: 25px solid black;
        }
        .triangle{
            border-left: 15px solid transparent;
            border-right:15px solid transparent ;
            border-bottom: 25px solid black;
            position: relative;
        }
        .triangle:after{
            content: "";
            position: absolute;
            top:4px;
            left:-9px;
            border-left: 9px solid transparent;
            border-right:  9px solid transparent;
            border-bottom: 18px solid burlywood;
        }
        .square{
            width: 20px;
            height: 20px;
            border: 0.3em solid black;
        }
         </style>

    </head>
    <body>
        <button>
            <div class="card">
                <div class="circle"></div>
                <div class="triangle"></div>
                <div class="square"></div>
            </div>
        </button>
    </body>

</html>
