<!DOCTYPE html>
<html>
    <head>
        <title>SQUID GAME</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/game-of-squids" rel="stylesheet">
    <link rel="stylesheet" href="P1.css">
    <style>
      body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: black; overflow: hidden; }
      .logo { position: relative; font-family: 'Game of Squids', 'Noto Sans KR', sans-serif; font-weight: 900; font-size: 120px; color: #ff2e63; text-align: center; animation: morph 6s ease-in-out infinite, float 3s ease-in-out infinite alternate; filter: drop-shadow(0 0 20px rgba(255, 46, 99, 0.8)); will-change: clip-path, transform; }
      @keyframes morph { 0%, 25% { clip-path: circle(50%); } 25%, 50% { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); } 50%, 75% { clip-path: inset(20% 0 20% 0); } 75%, 100% { clip-path: circle(50%); } }
      @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(-20px) rotate(2deg); } }
      .button-container { position: absolute; bottom: 50px; text-align: center; }
      button { padding: 15px 40px; font-size: 24px; background: #ff2e63; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
    </head>
    <body>
        <h1 class="logo">SQUID GAME</h1>
        <div class="button-container">
            <form action="P2.html">
                <button>Join Us</button>
            </form>
        </div>
    </body>
</html>
